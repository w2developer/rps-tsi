<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Real - Equipa RPS</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f6f9; padding: 20px; display: flex; justify-content: center; }
        .chat-wrapper { display: flex; width: 100%; max-width: 750px; height: 550px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Barra Lateral (Contactos) */
        .contacts-sidebar { width: 250px; border-right: 1px solid #eee; display: flex; flex-direction: column; background: #fcfcfc; }
        .sidebar-header { padding: 15px; background: #111; color: white; font-weight: bold; font-size: 0.85rem; border-bottom: 2px solid #28a745; }
        .contacts-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; cursor: pointer; display: flex; flex-direction: column; transition: 0.2s; }
        .contact-item:hover { background: #f0f0f0; }
        .contact-item.active { background: #e8f4fd; border-left: 4px solid #28a745; }
        .contact-name { font-weight: 600; font-size: 0.9rem; color: #333; text-transform: uppercase; }
        .contact-status { font-size: 0.7rem; color: #666; }

        /* Área da Conversa */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fafafa; }
        .chat-header { padding: 15px; background: #000; color: white; font-weight: bold; font-size: 0.95rem; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Balões */
        .msg-box { padding: 8px 12px; border-radius: 8px; max-width: 75%; width: fit-content; font-size: 0.9rem; line-height: 1.4; }
        .msg-box.me { background: #28a745; color: white; align-self: flex-end; border-bottom-right-radius: 1px; }
        .msg-box.other { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 1px; }
        
        .chat-input-area { display: flex; padding: 12px; border-top: 1px solid #eee; background: white; gap: 8px; }
        .chat-input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        .chat-input-area button { background: #28a745; color: white; border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .chat-input-area button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="chat-wrapper">
    <div class="contacts-sidebar">
        <div class="sidebar-header" id="identificacao-usuario">Utilizador: A carregar...</div>
        <div class="contacts-list" id="lista-contatos">
            <p style="text-align: center; font-size: 0.8rem; color: #999; margin-top: 20px;">A carregar equipa...</p>
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-header" id="nome-chat-ativo">Selecione um colega de equipa</div>
        <div class="chat-messages" id="zona-mensagens"></div>
        <form class="chat-input-area" id="form-chat">
            <input type="text" id="input-mensagem" placeholder="Selecione um contacto..." disabled required autocomplete="off">
            <button type="submit" id="btn-enviar" disabled>Enviar</button>
        </form>
    </div>
</div>

<script>
    // --- CONEXÃO COM O TEU SUPABASE ---
    const supabaseUrl = 'https://rtrjdiocezpityurvhpb.supabase.co';
    const supabaseKey = 'sb_publishable_Y9Jrgq2ylUEbcPGMG74fng_i5I0s5Oq';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // Captura o utilizador real logado no teu sistema (sessionStorage)
    const usuarioAtivo = JSON.parse(sessionStorage.getItem('usuario_logado'));
    
    // Se abrir o ficheiro solto sem login, ele assume "Admin" (que existe na tua tabela) para testes
    const MEU_ID = usuarioAtivo ? usuarioAtivo.nome : "Admin"; 
    document.getElementById('identificacao-usuario').textContent = `Logado como: ${MEU_ID}`;

    let contatoAtivoId = null;
    const zonaMensagens = document.getElementById('zona-mensagens');
    const inputMensagem = document.getElementById('input-mensagem');
    const btnEnviar = document.getElementById('btn-enviar');

    // 1. BUSCA A EQUIPA DIRETAMENTE DA TABELA 'usuarios' (NO PLURAL)
    async function carregarEquipaDoBanco() {
        const { data: usuarios, error } = await _supabase
            .from('usuarios') // Corrigido para plural
            .select('nome, cargo')
            .order('nome', { ascending: true });

        if (error) {
            console.error("Erro ao carregar equipa:", error.message);
            document.getElementById('lista-contatos').innerHTML = `<p style="color:red; text-align:center; padding:10px;">Erro: ${error.message}</p>`;
            return;
        }

        const container = document.getElementById('lista-contatos');
        container.innerHTML = '';
        
        // Filtra para remover a si mesmo da lista de contactos lateral
        usuarios.filter(u => u.nome !== MEU_ID).forEach(u => {
            const div = document.createElement('div');
            div.className = 'contact-item';
            div.setAttribute('data-id', u.nome);
            div.innerHTML = `
                <span class="contact-name">${u.nome}</span>
                <span class="contact-status">${u.cargo || 'Membro'}</span>
            `;
            div.onclick = () => selecionarContato(u.nome);
            container.appendChild(div);
        });

        if (container.children.length === 0) {
            container.innerHTML = '<p style="text-align: center; font-size: 0.8rem; color: #999; margin-top: 20px;">Nenhum outro utilizador encontrado.</p>';
        }
    }

    // 2. Selecionar Contacto
    async function selecionarContato(nomeContato) {
        contatoAtivoId = nomeContato;
        document.getElementById('nome-chat-ativo').textContent = `Conversa com ${nomeContato}`;
        
        inputMensagem.disabled = false;
        inputMensagem.placeholder = `Escrever para ${nomeContato}...`;
        btnEnviar.disabled = false;

        document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
        const elementoAtivo = document.querySelector(`[data-id="${nomeContato}"]`);
        if (elementoAtivo) elementoAtivo.classList.add('active');

        zonaMensagens.innerHTML = '';
        await carregarHistoricoPrivado();
    }

    // 3. Buscar Histórico de Mensagens entre os dois
    async function carregarHistoricoPrivado() {
        if (!contatoAtivoId) return;

        const { data, error } = await _supabase
            .from('mensagens_privadas')
            .select('*')
            .or(`and(remetente_id.eq.${MEU_ID},destinatario_id.eq.${contatoAtivoId}),and(remetente_id.eq.${contatoAtivoId},destinatario_id.eq.${MEU_ID})`)
            .order('criado_em', { ascending: true });

        if (!error && data) {
            data.forEach(msg => exibirMensagemNaTela(msg));
        }
    }

    // 4. Desenhar o balão na tela
    function exibirMensagemNaTela(msg) {
        const div = document.createElement('div');
        div.className = `msg-box ${msg.remetente_id === MEU_ID ? 'me' : 'other'}`;
        div.textContent = msg.conteudo_mensagem;
        
        zonaMensagens.appendChild(div);
        zonaMensagens.scrollTop = zonaMensagens.scrollHeight;
    }

    // 5. Enviar Mensagem Real
    document.getElementById('form-chat').addEventListener('submit', async (e) => {
        e.preventDefault();
        const texto = inputMensagem.value.trim();
        if (!texto || !contatoAtivoId) return;

        inputMensagem.value = '';

        const { error } = await _supabase.from('mensagens_privadas').insert([{
            remetente_id: MEU_ID,
            remetente_nome: MEU_ID,
            destinatario_id: contatoAtivoId,
            conteudo_mensagem: texto
        }]);

        if (error) console.error("Erro ao enviar:", error.message);
    });

    // 6. REALTIME: Atualização instantânea na tela
    _supabase
        .channel('canal-privado-real')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mensagens_privadas' }, payload => {
            const novaMsg = payload.new;
            
            const pertenceAConversaAtiva = 
                (novaMsg.remetente_id === MEU_ID && novaMsg.destinatario_id === contatoAtivoId) ||
                (novaMsg.remetente_id === contatoAtivoId && novaMsg.destinatario_id === MEU_ID);

            if (pertenceAConversaAtiva) {
                exibirMensagemNaTela(novaMsg);
            }
        })
        .subscribe();

    // Inicialização
    carregarEquipaDoBanco();
</script>

</body>
</html>
