<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS | Concludentes</title>
    <link rel="shortcut icon" href="/assets/logo.svg" type="image/x-icon">

    <!-- Styles -->
    <link rel="stylesheet" href="/styles/main.css">

    <!-- Scripts -->
    <script type="module" src="/scripts/scp-concludentes.js" defer></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- Remix Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // Verifica se existe um usuário no sessionStorage
        const usuarioAtivo = sessionStorage.getItem('usuario_logado');

        if (!usuarioAtivo) {
            // Se não estiver logado, manda de volta para o login
            window.location.href = '/pages/login.html';
        }
    </script>
</head>
<body>
    <div class="box-loader">
        <div class="loader"></div>
    </div>

    <header>
        <nav>
            <ul>
                <li><a href="/">Pagina Inicial</a></li>
                <li><a href="/pages/concludentes.html" class="active-menu">Concluídos</a></li>
            </ul>
        </nav>
        <div class="logout">
            <span id="usuario-logado" style="color: #fff;"></span>
            <button id="logout-button">Sair</button>
        </div>
    </header>

    <div class="container">
        <div class="filtros-e-adicionar">
            <div class="pesquisa">
                <input type="text" id="pesquisa" placeholder="Pesquisar aluno...">
            </div>
            <div class="adicionar-aluno">
                <button class="btn-adicionar" onclick="abrirModalCadastro()">
                    <i class="ri-add-fill"></i> Adicionar Aluno
                </button>
            </div>
        </div>
        
        <table class="listagem">
            <colgroup>
                <col style="width: 30%;">
                <!-- <col style="width: 13%;"> -->
                <col style="width: 13%;">
                <col style="width: 13%;">
                <col style="width: 13%;">
                <col style="width: 13%;">
                <col style="width: 5%;">
            </colgroup>

            <thead>
                <tr>
                    <th>Nome (A-Z)</th>
                    <th>Usuário</th>
                    <!-- <th>Usuário</th> -->
                    <th>Curso Concluído</th>
                    <th>Data de Conclusão</th>
                    <th>Certificado</th>
                    <th>Operações</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script>

    window.addEventListener('load', function() {
        const loaderBox = document.querySelector('.box-loader');
        if (loaderBox) {
            loaderBox.style.display = 'none';
        }
    });
    document.addEventListener('DOMContentLoaded', () => {
        const usuarioLogadoSpan = document.getElementById('usuario-logado');
        const logoutButton = document.getElementById('logout-button');

        // 1. Recupera os dados salvos no login
        const usuarioAtivo = JSON.parse(sessionStorage.getItem('usuario_logado'));

        // 2. Exibe o nome do usuário se ele existir
        if (usuarioAtivo && usuarioLogadoSpan) {
            usuarioLogadoSpan.textContent = `${usuarioAtivo.nome}`;
        }

        // 3. Função de Logout
        if (logoutButton) {
            logoutButton.addEventListener('click', () => {
                // Remove os dados da sessão
                sessionStorage.removeItem('usuario_logado');
                
                // Redireciona para a página de login
                // Como o index está na raiz e o login em pages/, o caminho é 'pages/login.html'
                window.location.href = 'pages/login.html';
            });
        }
    });
</script>

<script src="/scripts/chat-widget.js"></script>
</body>
</html>
