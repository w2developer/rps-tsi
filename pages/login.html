<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RPS Sistema</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; text-align: center; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #34495e; }
        .icon { font-size: 3rem; color: #2c3e50; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="ri-shield-user-line icon"></i>
        <h2>Insira o seu código do DK</h2>
        <input type="password" id="codigoAcesso" placeholder="Digite seu código" maxlength="15">
        <button onclick="tentarAcesso()">Entrar</button>
    </div>

    <script type="module">
        // 1. CONFIGURAÇÃO SUPABASE
        const supabaseUrl = 'https://rtrjdiocezpityurvhpb.supabase.co';
        const supabaseKey = 'sb_publishable_Y9Jrgq2ylUEbcPGMG74fng_i5I0s5Oq';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 2. FUNÇÃO DE LOG (Auditoria)
        async function registrarLog(usuario, acao, cargo) {
            await _supabase.from('logs').insert([{
                usuario: usuario,
                acao: acao,
                tabela: 'usuarios',
                detalhes: { 
                    cargo: cargo, 
                    horario: new Date().toLocaleString('pt-BR'),
                    evento: 'Login no sistema' 
                }
            }]);
        }

        // 3. LÓGICA DE ACESSO
        async function tentarAcesso() {
            const codigo = document.getElementById('codigoAcesso').value;

            if (!codigo) {
                Swal.fire('Atenção', 'Por favor, insira seu código de acesso.', 'warning');
                return;
            }

            // Busca o colaborador/admin pelo código
            const { data: usuario, error } = await _supabase
                .from('usuarios')
                .select('*')
                .eq('codigo_acesso', codigo)
                .single();

            if (error || !usuario) {
                Swal.fire('Erro', 'Código de acesso inválido.', 'error');
                return;
            }

            // Salva a sessão no navegador
            sessionStorage.setItem('usuario_logado', JSON.stringify(usuario));

            // Grava o rastro no banco de logs
            await registrarLog(usuario.nome, 'LOGIN', usuario.cargo);

            // 4. REDIRECIONAMENTO POR CARGO
            if (usuario.cargo === 'admin') {
                // Admin vai para a página de gerenciamento de equipe
                window.location.href = 'admin.html';
            } else {
                // Colaborador vai para a página inicial de alunos
                window.location.href = '../index.html';
            }
        }

        // Atalho: Enter no teclado
        document.getElementById('codigoAcesso').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') tentarAcesso();
        });

        // Torna a função acessível ao botão
        window.tentarAcesso = tentarAcesso;
    </script>
</body>
</html>
